<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pinterest Search | Multimedia Tools - Kelompok A</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.3s ease;
        }

        /* ========= TEMA GELAP PROFESIONAL (DEFAULT) ========= */
        body.dark {
            background: #05070a;
            color: #eef2ff;
        }

        body.light {
            background: #f8fafc;
            color: #0f172a;
        }

        /* ========= BACKGROUND ANIMASI ========= */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-base {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        body.dark .bg-base { background: #05070a; }
        body.light .bg-base { background: #f9fafb; }

        .gradient-aurora {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(45, 70, 100, 0.4) 0%, rgba(5, 7, 10, 0) 70%),
                        radial-gradient(circle at 85% 70%, rgba(80, 100, 130, 0.3) 0%, rgba(5, 7, 10, 0) 70%);
            animation: auroraPulse 14s ease-in-out infinite;
        }

        body.light .gradient-aurora {
            background: radial-gradient(circle at 20% 30%, rgba(148, 163, 184, 0.2) 0%, rgba(249, 250, 251, 0) 70%),
                        radial-gradient(circle at 85% 70%, rgba(100, 116, 139, 0.15) 0%, rgba(249, 250, 251, 0) 70%);
        }

        @keyframes auroraPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: floatOrb 20s ease-in-out infinite;
        }
        body.dark .orb { opacity: 0.45; }
        body.light .orb { opacity: 0.3; }

        .orb-1 { width: 550px; height: 550px; background: #2c3e55; top: -200px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 600px; height: 600px; background: #1f2a3a; bottom: -200px; right: -150px; animation-delay: 6s; }
        .orb-3 { width: 450px; height: 450px; background: #3a4c66; top: 40%; left: 70%; animation-delay: 12s; }
        .orb-4 { width: 380px; height: 380px; background: #1e2a3a; bottom: 15%; left: -5%; animation-delay: 3s; }
        .orb-5 { width: 500px; height: 500px; background: #2d3e54; top: 10%; left: 25%; animation-delay: 9s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(55px, -45px) scale(1.1); }
            66% { transform: translate(-35px, 40px) scale(0.95); }
        }

        .grid-subtle {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 70px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 70px);
            animation: gridSlide 25s linear infinite;
            pointer-events: none;
        }

        body.light .grid-subtle {
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,0,0,0.025) 0px, rgba(0,0,0,0.025) 1px, transparent 1px, transparent 70px),
                repeating-linear-gradient(90deg, rgba(0,0,0,0.025) 0px, rgba(0,0,0,0.025) 1px, transparent 1px, transparent 70px);
        }

        @keyframes gridSlide {
            0% { transform: translate(0, 0); }
            100% { transform: translate(70px, 70px); }
        }

        .diagonal-flow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 55px);
            animation: diagonalFlow 22s linear infinite;
            pointer-events: none;
        }

        body.light .diagonal-flow {
            background: repeating-linear-gradient(45deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 55px);
        }

        @keyframes diagonalFlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(55px, 55px); }
        }

        .noise-soft {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            animation: subtleNoise 6s steps(3) infinite;
        }

        @keyframes subtleNoise {
            0%, 100% { opacity: 0.03; }
            50% { opacity: 0.05; }
        }

        /* ========= PARTIKEL BERGERAK DARI BAWAH KE ATAS ========= */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        body.dark .particle {
            background: rgba(180, 200, 230, 0.6);
        }
        body.light .particle {
            background: rgba(60, 80, 110, 0.35);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ========= HAMBURGER MENU ========= */
        .hamburger {
            position: fixed;
            top: 28px;
            left: 28px;
            width: 48px;
            height: 48px;
            background: rgba(20, 24, 32, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .hamburger i {
            font-size: 1.4rem;
            color: #cbd5e6;
            transition: transform 0.2s;
        }

        .hamburger:hover {
            background: rgba(35, 40, 50, 0.9);
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.15);
        }

        body.light .hamburger {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.05);
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
        }
        body.light .hamburger i { color: #1e293b; }

        /* ========= DRAWER ========= */
        .drawer {
            position: fixed;
            top: 0;
            left: -340px;
            width: 300px;
            height: 100vh;
            background: rgba(8, 10, 15, 0.96);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 200;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 32px rgba(0,0,0,0.3);
        }

        .drawer.open { left: 0; }

        body.light .drawer {
            background: rgba(255,255,255,0.97);
            border-right: 1px solid rgba(0,0,0,0.05);
            box-shadow: 4px 0 24px rgba(0,0,0,0.05);
        }

        .drawer-header {
            margin-bottom: 2rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .drawer-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #fff, #9aaec0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light .drawer-header h2 {
            background: linear-gradient(120deg, #0f172a, #2d3a4e);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .drawer-header p { font-size: 0.7rem; color: #8a99b0; margin-top: 6px; }

        .drawer-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .drawer-link {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            color: #b9c2d4;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 16px;
            transition: all 0.2s;
            font-weight: 470;
        }

        .drawer-link i { width: 32px; font-size: 1.1rem; }

        .drawer-link:hover, .drawer-link.active {
            background: rgba(255,255,255,0.07);
            color: white;
        }
        body.light .drawer-link { color: #334155; }
        body.light .drawer-link:hover, body.light .drawer-link.active {
            background: rgba(0,0,0,0.04);
            color: #0f172a;
        }

        .drawer-footer {
            padding-top: 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.07);
            font-size: 0.7rem;
            text-align: center;
            color: #6c7a91;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
        }
        .overlay.show { display: block; }

        /* ========= TOMBOL TEMA (TERANG/GELAP) ========= */
        .theme-toggle {
            position: fixed;
            top: 28px;
            right: 28px;
            width: 48px;
            height: 48px;
            background: rgba(20, 24, 32, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }
        .theme-toggle i { font-size: 1.3rem; color: #facc15; }
        body.light .theme-toggle { background: rgba(255,255,255,0.85); border-color: rgba(0,0,0,0.05); }
        body.light .theme-toggle i { color: #334155; }
        .theme-toggle:hover { transform: scale(1.03); background: #2d3748; }
        body.light .theme-toggle:hover { background: white; }

        /* ========= MAIN CONTENT ========= */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .tool-header {
            text-align: center;
            margin: 2rem 0 2rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #ffffff 0%, #b9c8e8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        body.light .tool-header h1 {
            background: linear-gradient(135deg, #0f172a, #2c3e50);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .tool-header p {
            font-size: 0.95rem;
            color: #9aaebf;
        }
        body.light .tool-header p { color: #475569; }

        .hero-divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #5f7f9e, transparent);
            margin: 1.2rem auto 0;
            border-radius: 4px;
        }

        /* Search Box */
        .search-box {
            background: rgba(15, 20, 28, 0.45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 2rem;
        }
        body.light .search-box {
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .search-box label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a99b0;
            margin-bottom: 0.6rem;
        }
        body.light .search-box label { color: #5b6e8c; }

        .search-input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }
        .search-input-group input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #eef2ff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        body.light .search-input-group input {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.08);
            color: #0f172a;
        }
        .search-input-group input:focus {
            border-color: rgba(255,255,255,0.2);
        }

        /* ========= TOMBOL HIJAU DIKUNCI ========= */
        .search-input-group button {
            padding: 14px 28px;
            background: #10B981 !important;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .search-input-group button:hover {
            background: #059669 !important;
            transform: translateY(-2px);
        }

        .type-select {
            display: flex;
            gap: 1rem;
        }
        .type-btn {
            flex: 1;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #9aaebf;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        body.light .type-btn {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.08);
        }
        .type-btn.active {
            background: #10B981 !important;
            border-color: #10B981 !important;
            color: white;
        }
        .type-btn:hover:not(.active) {
            background: rgba(255,255,255,0.08);
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }
        .loading-text {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #10B981;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .results-info {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #9aaebf;
        }
        body.light .results-info { color: #5b6e8c; }

        .pin-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        body.light .pin-card {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.08);
        }

        .pin-image {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .pin-video {
            width: 100%;
            max-height: 500px;
        }

        .pin-info {
            padding: 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        body.light .pin-info {
            border-top-color: rgba(0,0,0,0.06);
        }

        .pin-description {
            font-size: 0.85rem;
            color: #cbd5e6;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        body.light .pin-description { color: #334155; }

        .pin-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.7rem;
            color: #8a99b0;
            flex-wrap: wrap;
            gap: 8px;
        }
        body.light .pin-meta { color: #5b6e8c; }

        .pin-pinner {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pin-pinner img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 12px 32px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
        }
        .nav-prev {
            background: #3B82F6;
            color: white;
        }
        .nav-prev:hover:not(:disabled) {
            background: #2563EB;
            transform: translateY(-2px);
        }
        .nav-next {
            background: #10B981;
            color: white;
        }
        .nav-next:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-2px);
        }
        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .counter {
            text-align: center;
            font-size: 0.75rem;
            color: #8a99b0;
            margin-top: 0.5rem;
        }

        .tutorial-download {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 1rem;
            margin-top: 1rem;
        }
        body.light .tutorial-download {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.06);
        }
        .tutorial-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #10B981;
            margin-bottom: 0.5rem;
        }
        .tutorial-download .step {
            font-size: 0.7rem;
            color: #9aaebf;
            padding: 4px 0;
        }
        body.light .tutorial-download .step { color: #5b6e8c; }
        .tutorial-download .step strong { color: #F97316; }

        .error {
            color: #f87171;
            text-align: center;
            padding: 1rem;
        }

        .footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.04);
            font-size: 0.7rem;
            color: #7c8aa0;
        }
        body.light .footer {
            border-top-color: rgba(0,0,0,0.06);
            color: #94a3b8;
        }

        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .tool-header h1 { font-size: 1.8rem; }
            .search-box { padding: 1.2rem; }
            .search-input-group { flex-direction: column; }
            .nav-buttons { flex-direction: column; align-items: center; }
            .nav-btn { width: 80%; text-align: center; }
            .hamburger, .theme-toggle { width: 42px; height: 42px; top: 18px; }
            .hamburger { left: 18px; }
            .theme-toggle { right: 18px; }
        }
    </style>
</head>
<body class="dark">
    <!-- Background -->
    <div class="bg">
        <div class="bg-base"></div>
        <div class="gradient-aurora"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
        <div class="grid-subtle"></div>
        <div class="diagonal-flow"></div>
        <div class="noise-soft"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
    </div>

    <!-- Tombol Tema -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <!-- Drawer -->
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <h2>multimedia<span style="font-size:0.9rem;"> tools</span></h2>
            <p>kelompok a • dkv</p>
        </div>
        <nav class="drawer-nav">
            <a href="dasbor.html" class="drawer-link">
                <i class="fas fa-compass"></i> Dashboard
            </a>
            <a href="fitur.html" class="drawer-link">
                <i class="fas fa-cubes"></i> Semua Fitur
            </a>
        </nav>
        <div class="drawer-footer">
            <i class="fas fa-crown"></i> creative suite v2.0
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="tool-header">
            <h1><i class="fab fa-pinterest"></i> Pinterest Search</h1>
            <p>Cari gambar, video, atau GIF dari Pinterest dengan mudah</p>
            <div class="hero-divider"></div>
        </div>

        <div class="search-box">
            <label><i class="fab fa-pinterest"></i> Kata Kunci</label>
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="Contoh: yui mizuno, anime, landscape, kucing lucu">
                <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
            </div>
            <div class="type-select">
                <div class="type-btn active" data-type="image"><i class="fas fa-image"></i> Gambar</div>
                <div class="type-btn" data-type="video"><i class="fas fa-video"></i> Video</div>
                <div class="type-btn" data-type="gif"><i class="fas fa-file-image"></i> GIF</div>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;"><span class="loading-text"></span> Mencari...</div>
        <div id="resultsInfo" class="results-info"></div>
        
        <div id="pinDisplay"></div>
        
        <div id="navButtons" class="nav-buttons"></div>
        <div id="counter" class="counter"></div>
        <div id="error" class="error"></div>

        <div class="footer">
            <p>© 2026 Kelompok A • DKV / Multimedia • Pinterest Search</p>
        </div>
    </div>

    <script>
        // Drawer menu
        const hamburger = document.getElementById('hamburger');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');

        function openDrawer() {
            drawer.classList.add('open');
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            overlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        hamburger.addEventListener('click', openDrawer);
        overlay.addEventListener('click', closeDrawer);

        // ========= PARTIKEL BERGERAK =========
        const particlesContainer = document.getElementById('particles');
        
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = 2 + Math.random() * 5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            const duration = 4 + Math.random() * 10;
            particle.style.animationDuration = duration + 's';
            const delay = Math.random() * 8;
            particle.style.animationDelay = delay + 's';
            particlesContainer.appendChild(particle);
            setTimeout(() => {
                if (particle && particle.remove) particle.remove();
            }, duration * 1000 + 1000);
        }
        
        for (let i = 0; i < 80; i++) createParticle();
        setInterval(() => {
            const count = 2 + Math.floor(Math.random() * 4);
            for (let i = 0; i < count; i++) createParticle();
        }, 800);
        
        setInterval(() => {
            const particles = document.querySelectorAll('.particle');
            if (particles.length > 200) {
                for (let i = 0; i < 50; i++) {
                    if (particles[i] && particles[i].remove) particles[i].remove();
                }
            }
        }, 15000);

        // ========= TEMA =========
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        const savedTheme = localStorage.getItem('multimedia_theme_pinterest');
        if (savedTheme === 'light') {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        } else if (savedTheme === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
        } else {
            localStorage.setItem('multimedia_theme_pinterest', 'dark');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
        }

        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('multimedia_theme_pinterest', 'light');
            } else {
                document.body.classList.remove('light');
                document.body.classList.add('dark');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('multimedia_theme_pinterest', 'dark');
            }
        });

        // ========= PINTEREST SEARCH =========
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const loadingDiv = document.getElementById('loading');
        const resultsInfo = document.getElementById('resultsInfo');
        const pinDisplay = document.getElementById('pinDisplay');
        const navButtonsDiv = document.getElementById('navButtons');
        const counterDiv = document.getElementById('counter');
        const errorDiv = document.getElementById('error');
        
        let currentData = [];
        let currentIndex = 0;
        let currentQuery = '';
        let currentType = 'image';
        
        function downloadImage(url) {
            window.open(url, '_blank');
        }
        
        async function searchPinterest(query, type) {
            if (!query.trim()) {
                errorDiv.innerHTML = '<p class="error"><i class="fas fa-exclamation-triangle"></i> Masukkan kata kunci pencarian</p>';
                return;
            }
            
            loadingDiv.style.display = 'block';
            pinDisplay.innerHTML = '';
            navButtonsDiv.innerHTML = '';
            counterDiv.innerHTML = '';
            resultsInfo.innerHTML = '';
            errorDiv.innerHTML = '';
            currentIndex = 0;
            
            try {
                const response = await fetch(`https://api.siputzx.my.id/api/s/pinterest?query=${encodeURIComponent(query)}&type=${type}`);
                const data = await response.json();
                console.log('API Response:', data);
                
                if (data && data.status === true && data.data && data.data.length > 0) {
                    currentData = data.data;
                    currentQuery = query;
                    currentType = type;
                    const typeText = type === 'image' ? 'gambar' : (type === 'video' ? 'video' : 'GIF');
                    resultsInfo.innerHTML = `<i class="fas fa-check-circle" style="color:#10B981;"></i> Ditemukan ${currentData.length} ${typeText} untuk "${escapeHtml(query)}"`;
                    displayCurrentPin();
                } else {
                    errorDiv.innerHTML = '<p class="error"><i class="fas fa-times-circle"></i> Tidak ada hasil ditemukan untuk "' + escapeHtml(query) + '"</p>';
                }
            } catch (err) {
                console.error(err);
                errorDiv.innerHTML = '<p class="error"><i class="fas fa-wifi"></i> Error: Gagal mengambil data. Coba lagi nanti.</p>';
            }
            loadingDiv.style.display = 'none';
        }
        
        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                displayCurrentPin();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        function goToNext() {
            if (currentIndex < currentData.length - 1) {
                currentIndex++;
                displayCurrentPin();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
        
        function displayCurrentPin() {
            if (currentData.length === 0) return;
            
            const item = currentData[currentIndex];
            const total = currentData.length;
            const currentNumber = currentIndex + 1;
            const type = currentType;
            
            let mediaHtml = '';
            if (type === 'image') {
                mediaHtml = `<img src="${item.image_url}" class="pin-image" alt="Pinterest image" loading="lazy" onerror="this.src='https://placehold.co/800x600/1A1D24/9CA3AF?text=Gambar+Gagal+Dimuat'" ondblclick="downloadImage('${item.image_url}')">`;
            } else if (type === 'video' && item.video_url) {
                mediaHtml = `<video src="${item.video_url}" class="pin-video" controls></video>`;
            } else if (type === 'gif' && item.gif_url) {
                mediaHtml = `<img src="${item.gif_url}" class="pin-image" alt="GIF" loading="lazy">`;
            } else {
                mediaHtml = `<img src="${item.image_url}" class="pin-image" alt="Pinterest image" loading="lazy">`;
            }
            
            const description = item.description && item.description !== ' ' 
                ? item.description 
                : (item.seo_alt_text && item.seo_alt_text !== ' ' ? item.seo_alt_text : 'Tidak ada deskripsi');
            
            pinDisplay.innerHTML = `
                <div class="pin-card">
                    ${mediaHtml}
                    <div class="pin-info">
                        <div class="pin-description">${escapeHtml(description.substring(0, 200))}</div>
                        <div class="pin-meta">
                            <div class="pin-pinner">
                                ${item.pinner?.image_small_url ? `<img src="${item.pinner.image_small_url}">` : '<i class="fas fa-user-circle"></i>'}
                                <span>@${escapeHtml(item.pinner?.username || 'unknown')}</span>
                            </div>
                            <div>
                                <i class="fas fa-heart" style="color:#f43f5e;"></i> ${item.reaction_counts?.['1'] || 0}
                            </div>
                        </div>
                        <div class="pin-meta">
                            <span><i class="fas fa-calendar-alt"></i> ${item.created_at || 'Tidak diketahui'}</span>
                            <a href="${item.pin}" target="_blank" style="color:#10B981; text-decoration:none; font-size:0.7rem;">
                                <i class="fab fa-pinterest"></i> Lihat di Pinterest
                            </a>
                        </div>
                    </div>
                </div>
            `;
            
            const typeText = type === 'image' ? 'gambar' : (type === 'video' ? 'video' : 'GIF');
            navButtonsDiv.innerHTML = `
                <button class="nav-btn nav-prev" id="prevBtn" ${currentIndex === 0 ? 'disabled' : ''}>
                    <i class="fas fa-chevron-left"></i> Sebelumnya
                </button>
                <button class="nav-btn nav-next" id="nextBtn" ${currentIndex === total - 1 ? 'disabled' : ''}>
                    Selanjutnya <i class="fas fa-chevron-right"></i>
                </button>
            `;
            
            counterDiv.innerHTML = `${currentNumber} dari ${total} ${typeText}`;
            
            // Tutor download - tekan lama pada gambar
            const existingTutorial = document.querySelector('.tutorial-download');
            if (!existingTutorial && type === 'image') {
                const tutorialDiv = document.createElement('div');
                tutorialDiv.className = 'tutorial-download';
                tutorialDiv.innerHTML = `
                    <div class="tutorial-title"><i class="fas fa-download"></i> Cara Download Gambar</div>
                    <div class="step">1. Tekan dan tahan pada gambar</div>
                    <div class="step">2. Pilih <strong>Download gambar</strong> atau <strong>Save image</strong></div>
                    <div class="step">3. Atau double klik gambar untuk membuka di tab baru</div>
                `;
                navButtonsDiv.parentNode.insertBefore(tutorialDiv, navButtonsDiv.nextSibling);
            }
            
            document.getElementById('prevBtn')?.addEventListener('click', goToPrev);
            document.getElementById('nextBtn')?.addEventListener('click', goToNext);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Type selection
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                const query = searchInput.value.trim();
                if (query) {
                    searchPinterest(query, currentType);
                }
            });
        });
        
        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if (query) {
                searchPinterest(query, currentType);
            }
        });
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });
        
        window.downloadImage = downloadImage;
    </script>
</body>
</html>

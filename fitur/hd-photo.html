<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HD Photo Enhancer | Multimedia Tools - Kelompok A</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), color 0.3s ease;
        }

        /* ========= TEMA GELAP PROFESIONAL (DEFAULT) ========= */
        body.dark {
            background: #05070a;
            color: #eef2ff;
        }

        body.light {
            background: #f8fafc;
            color: #0f172a;
        }

        /* ========= BACKGROUND ANIMASI ========= */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-base {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        body.dark .bg-base { background: #05070a; }
        body.light .bg-base { background: #f9fafb; }

        .gradient-aurora {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(45, 70, 100, 0.4) 0%, rgba(5, 7, 10, 0) 70%),
                        radial-gradient(circle at 85% 70%, rgba(80, 100, 130, 0.3) 0%, rgba(5, 7, 10, 0) 70%);
            animation: auroraPulse 14s ease-in-out infinite;
        }

        body.light .gradient-aurora {
            background: radial-gradient(circle at 20% 30%, rgba(148, 163, 184, 0.2) 0%, rgba(249, 250, 251, 0) 70%),
                        radial-gradient(circle at 85% 70%, rgba(100, 116, 139, 0.15) 0%, rgba(249, 250, 251, 0) 70%);
        }

        @keyframes auroraPulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: floatOrb 20s ease-in-out infinite;
        }
        body.dark .orb { opacity: 0.45; }
        body.light .orb { opacity: 0.3; }

        .orb-1 { width: 550px; height: 550px; background: #2c3e55; top: -200px; left: -150px; animation-delay: 0s; }
        .orb-2 { width: 600px; height: 600px; background: #1f2a3a; bottom: -200px; right: -150px; animation-delay: 6s; }
        .orb-3 { width: 450px; height: 450px; background: #3a4c66; top: 40%; left: 70%; animation-delay: 12s; }
        .orb-4 { width: 380px; height: 380px; background: #1e2a3a; bottom: 15%; left: -5%; animation-delay: 3s; }
        .orb-5 { width: 500px; height: 500px; background: #2d3e54; top: 10%; left: 25%; animation-delay: 9s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(55px, -45px) scale(1.1); }
            66% { transform: translate(-35px, 40px) scale(0.95); }
        }

        .grid-subtle {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 70px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 70px);
            animation: gridSlide 25s linear infinite;
            pointer-events: none;
        }

        body.light .grid-subtle {
            background-image: 
                repeating-linear-gradient(0deg, rgba(0,0,0,0.025) 0px, rgba(0,0,0,0.025) 1px, transparent 1px, transparent 70px),
                repeating-linear-gradient(90deg, rgba(0,0,0,0.025) 0px, rgba(0,0,0,0.025) 1px, transparent 1px, transparent 70px);
        }

        @keyframes gridSlide {
            0% { transform: translate(0, 0); }
            100% { transform: translate(70px, 70px); }
        }

        .diagonal-flow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 55px);
            animation: diagonalFlow 22s linear infinite;
            pointer-events: none;
        }

        body.light .diagonal-flow {
            background: repeating-linear-gradient(45deg, rgba(0,0,0,0.01) 0px, rgba(0,0,0,0.01) 1px, transparent 1px, transparent 55px);
        }

        @keyframes diagonalFlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(55px, 55px); }
        }

        .noise-soft {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            animation: subtleNoise 6s steps(3) infinite;
        }

        @keyframes subtleNoise {
            0%, 100% { opacity: 0.03; }
            50% { opacity: 0.05; }
        }

        /* ========= PARTIKEL BERGERAK DARI BAWAH KE ATAS ========= */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            bottom: -20px;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        body.dark .particle {
            background: rgba(180, 200, 230, 0.6);
        }
        body.light .particle {
            background: rgba(60, 80, 110, 0.35);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ========= HAMBURGER MENU ========= */
        .hamburger {
            position: fixed;
            top: 28px;
            left: 28px;
            width: 48px;
            height: 48px;
            background: rgba(20, 24, 32, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .hamburger i {
            font-size: 1.4rem;
            color: #cbd5e6;
            transition: transform 0.2s;
        }

        .hamburger:hover {
            background: rgba(35, 40, 50, 0.9);
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.15);
        }

        body.light .hamburger {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.05);
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
        }
        body.light .hamburger i { color: #1e293b; }

        /* ========= DRAWER ========= */
        .drawer {
            position: fixed;
            top: 0;
            left: -340px;
            width: 300px;
            height: 100vh;
            background: rgba(8, 10, 15, 0.96);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 200;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 32px rgba(0,0,0,0.3);
        }

        .drawer.open { left: 0; }

        body.light .drawer {
            background: rgba(255,255,255,0.97);
            border-right: 1px solid rgba(0,0,0,0.05);
            box-shadow: 4px 0 24px rgba(0,0,0,0.05);
        }

        .drawer-header {
            margin-bottom: 2rem;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .drawer-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #fff, #9aaec0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        body.light .drawer-header h2 {
            background: linear-gradient(120deg, #0f172a, #2d3a4e);
            -webkit-background-clip: text;
            background-clip: text;
        }
        .drawer-header p { font-size: 0.7rem; color: #8a99b0; margin-top: 6px; }

        .drawer-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .drawer-link {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            color: #b9c2d4;
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 16px;
            transition: all 0.2s;
            font-weight: 470;
        }

        .drawer-link i { width: 32px; font-size: 1.1rem; }

        .drawer-link:hover, .drawer-link.active {
            background: rgba(255,255,255,0.07);
            color: white;
        }
        body.light .drawer-link { color: #334155; }
        body.light .drawer-link:hover, body.light .drawer-link.active {
            background: rgba(0,0,0,0.04);
            color: #0f172a;
        }

        .drawer-footer {
            padding-top: 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.07);
            font-size: 0.7rem;
            text-align: center;
            color: #6c7a91;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
        }
        .overlay.show { display: block; }

        /* ========= TOMBOL TEMA (TERANG/GELAP) ========= */
        .theme-toggle {
            position: fixed;
            top: 28px;
            right: 28px;
            width: 48px;
            height: 48px;
            background: rgba(20, 24, 32, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }
        .theme-toggle i { font-size: 1.3rem; color: #facc15; }
        body.light .theme-toggle { background: rgba(255,255,255,0.85); border-color: rgba(0,0,0,0.05); }
        body.light .theme-toggle i { color: #334155; }
        .theme-toggle:hover { transform: scale(1.03); background: #2d3748; }
        body.light .theme-toggle:hover { background: white; }

        /* ========= MAIN CONTENT ========= */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .tool-header {
            text-align: center;
            margin: 2rem 0 2rem;
        }

        .tool-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #ffffff 0%, #b9c8e8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        body.light .tool-header h1 {
            background: linear-gradient(135deg, #0f172a, #2c3e50);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .tool-header p {
            font-size: 0.95rem;
            color: #9aaebf;
        }
        body.light .tool-header p { color: #475569; }

        .hero-divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #5f7f9e, transparent);
            margin: 1.2rem auto 0;
            border-radius: 4px;
        }

        /* Form Card */
        .form-card {
            background: rgba(15, 20, 28, 0.45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            padding: 2rem;
            margin-top: 1rem;
        }
        body.light .form-card {
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a99b0;
            margin-bottom: 0.6rem;
        }
        body.light .input-group label { color: #5b6e8c; }

        .upload-box { width: 100%; }
        .file-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        body.light .file-label {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.08);
        }
        .file-label:hover {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
        }
        .file-label i { font-size: 1.2rem; color: #9aaebf; }
        .file-label span { font-size: 0.85rem; color: #9aaebf; }
        .file-name { font-size: 0.75rem; color: #7c8aa0; margin-top: 8px; }
        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            margin-top: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            object-fit: contain;
        }

        .scale-select {
            margin-bottom: 1.5rem;
        }
        .scale-select label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a99b0;
            display: block;
            margin-bottom: 0.6rem;
        }
        .scale-select select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #eef2ff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
        }
        body.light .scale-select select {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.08);
            color: #0f172a;
        }
        .scale-select select:focus {
            border-color: rgba(255,255,255,0.2);
            outline: none;
        }

        .rotate-checkbox {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rotate-checkbox label {
            font-size: 0.75rem;
            color: #9aaebf;
            cursor: pointer;
        }
        body.light .rotate-checkbox label { color: #5b6e8c; }
        .rotate-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #10B981;
        }

        /* ========= TOMBOL HIJAU DIKUNCI ========= */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: #10B981 !important;
            border: 1px solid #10B981 !important;
            color: #ffffff !important;
        }

        .btn-primary:hover {
            background: #059669 !important;
            border-color: #059669 !important;
            color: #ffffff !important;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 1.8rem;
            padding: 1.2rem;
            background: rgba(0,0,0,0.25);
            border-radius: 20px;
            display: none;
            text-align: center;
        }
        body.light .result {
            background: rgba(0,0,0,0.03);
        }

        .loading-text {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #10B981;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            color: #f87171;
            font-size: 0.85rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        .modal img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-close:hover { color: #10B981; }

        .result-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .result-img:hover {
            transform: scale(1.02);
            border-color: #10B981;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            padding: 10px 28px;
            background: #10B981;
            border: none;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .download-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .info-text {
            font-size: 0.7rem;
            color: #7c8aa0;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.04);
            font-size: 0.7rem;
            color: #7c8aa0;
        }
        body.light .footer {
            border-top-color: rgba(0,0,0,0.06);
            color: #94a3b8;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .tool-header h1 { font-size: 1.8rem; }
            .form-card { padding: 1.5rem; }
            .hamburger, .theme-toggle { width: 42px; height: 42px; top: 18px; }
            .hamburger { left: 18px; }
            .theme-toggle { right: 18px; }
        }
    </style>
</head>
<body class="dark">
    <!-- Background -->
    <div class="bg">
        <div class="bg-base"></div>
        <div class="gradient-aurora"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
        <div class="grid-subtle"></div>
        <div class="diagonal-flow"></div>
        <div class="noise-soft"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Hamburger -->
    <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
    </div>

    <!-- Tombol Tema -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <!-- Drawer -->
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <h2>multimedia<span style="font-size:0.9rem;"> tools</span></h2>
            <p>kelompok a • dkv</p>
        </div>
        <nav class="drawer-nav">
            <a href="../dasbor.html" class="drawer-link">
                <i class="fas fa-compass"></i> Dashboard
            </a>
            <a href="../fitur.html" class="drawer-link">
                <i class="fas fa-cubes"></i> Semua Fitur
            </a>
        </nav>
        <div class="drawer-footer">
            <i class="fas fa-crown"></i> creative suite v2.0
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <!-- Modal Zoom -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImage" src="">
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="tool-header">
            <h1>HD Photo Enhancer</h1>
            <p>Tingkatkan kualitas foto hingga HD/4K dengan AI</p>
            <div class="hero-divider"></div>
        </div>

        <div class="form-card">
            <div class="input-group">
                <label><i class="fas fa-image"></i> Pilih Gambar</label>
                <div class="upload-box">
                    <div class="file-label" id="uploadClick">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span>Klik untuk pilih gambar</span>
                    </div>
                    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg,image/webp" hidden>
                    <div class="file-name" id="fileName">Belum ada file dipilih</div>
                    <div id="preview"></div>
                </div>
            </div>

            <div class="scale-select">
                <label><i class="fas fa-expand"></i> Faktor Pembesaran (Scale)</label>
                <select id="scaleSelect">
                    <option value="2">2x (HD)</option>
                    <option value="4" selected>4x (4K/Ultra HD)</option>
                </select>
            </div>

            <div class="rotate-checkbox">
                <input type="checkbox" id="rotateCheckbox">
                <label for="rotateCheckbox"><i class="fas fa-undo-alt"></i> Rotasi 90° (jika hasil tiduran)</label>
            </div>

            <button class="btn btn-primary" id="enhanceBtn" disabled>
                <i class="fas fa-magic"></i> HD-kan Foto
            </button>

            <div id="result" class="result"></div>
        </div>

        <div class="footer">
            <p>© 2026 Kelompok A • DKV / Multimedia • AI Photo Enhancer</p>
        </div>
    </div>

    <script>
        // Drawer menu
        const hamburger = document.getElementById('hamburger');
        const drawer = document.getElementById('drawer');
        const overlay = document.getElementById('overlay');

        function openDrawer() {
            drawer.classList.add('open');
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            drawer.classList.remove('open');
            overlay.classList.remove('show');
            document.body.style.overflow = '';
        }

        hamburger.addEventListener('click', openDrawer);
        overlay.addEventListener('click', closeDrawer);

        // ========= PARTIKEL BERGERAK =========
        const particlesContainer = document.getElementById('particles');
        
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = 2 + Math.random() * 5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            const duration = 4 + Math.random() * 10;
            particle.style.animationDuration = duration + 's';
            const delay = Math.random() * 8;
            particle.style.animationDelay = delay + 's';
            particlesContainer.appendChild(particle);
            setTimeout(() => {
                if (particle && particle.remove) particle.remove();
            }, duration * 1000 + 1000);
        }
        
        for (let i = 0; i < 80; i++) createParticle();
        setInterval(() => {
            const count = 2 + Math.floor(Math.random() * 4);
            for (let i = 0; i < count; i++) createParticle();
        }, 800);
        
        setInterval(() => {
            const particles = document.querySelectorAll('.particle');
            if (particles.length > 200) {
                for (let i = 0; i < 50; i++) {
                    if (particles[i] && particles[i].remove) particles[i].remove();
                }
            }
        }, 15000);

        // ========= TEMA =========
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        const savedTheme = localStorage.getItem('multimedia_theme_hdphoto');
        if (savedTheme === 'light') {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
        } else if (savedTheme === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
        } else {
            localStorage.setItem('multimedia_theme_hdphoto', 'dark');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
        }

        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
                localStorage.setItem('multimedia_theme_hdphoto', 'light');
            } else {
                document.body.classList.remove('light');
                document.body.classList.add('dark');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
                localStorage.setItem('multimedia_theme_hdphoto', 'dark');
            }
        });

        // ========= HD PHOTO ENHANCER =========
        const fileInput = document.getElementById('fileInput');
        const uploadClick = document.getElementById('uploadClick');
        const fileNameSpan = document.getElementById('fileName');
        const previewDiv = document.getElementById('preview');
        const enhanceBtn = document.getElementById('enhanceBtn');
        const resultDiv = document.getElementById('result');
        const scaleSelect = document.getElementById('scaleSelect');
        const rotateCheckbox = document.getElementById('rotateCheckbox');
        let selectedFile = null;
        let previewUrl = null;

        function openModal(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'flex';
            modalImg.src = imgSrc;
        }
        
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        uploadClick.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                selectedFile = e.target.files[0];
                fileNameSpan.innerHTML = `<i class="fas fa-check-circle" style="color:#10B981;"></i> ${selectedFile.name}`;
                if (previewUrl) URL.revokeObjectURL(previewUrl);
                previewUrl = URL.createObjectURL(selectedFile);
                previewDiv.innerHTML = `<img src="${previewUrl}" class="preview-img" alt="Preview">`;
                enhanceBtn.disabled = false;
            } else {
                fileNameSpan.innerHTML = 'Belum ada file dipilih';
                previewDiv.innerHTML = '';
                enhanceBtn.disabled = true;
            }
        });

        function rotateImage(imageUrl, callback) {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.height;
                canvas.height = img.width;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(90 * Math.PI / 180);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    callback(url);
                }, 'image/png');
            };
            img.src = imageUrl;
        }

        function downloadFile(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        enhanceBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<p class="error"><i class="fas fa-exclamation-triangle"></i> Pilih gambar terlebih dahulu</p>';
                return;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div style="padding:1rem;"><span class="loading-text"></span> Memproses HD... (10-30 detik)</div>';
            enhanceBtn.disabled = true;
            
            try {
                const scale = scaleSelect.value;
                const formData = new FormData();
                formData.append('image', selectedFile);
                formData.append('scale', scale);
                formData.append('apikey', 'uTcTG');
                
                const response = await fetch('https://api.theresav.biz.id/tools/hd', {
                    method: 'POST',
                    body: formData
                });
                
                const blob = await response.blob();
                let hdUrl = URL.createObjectURL(blob);
                
                // Rotasi jika dicentang
                if (rotateCheckbox.checked) {
                    resultDiv.innerHTML = '<div style="padding:1rem;"><span class="loading-text"></span> Memutar gambar...</div>';
                    await new Promise((resolve) => {
                        rotateImage(hdUrl, (rotatedUrl) => {
                            URL.revokeObjectURL(hdUrl);
                            hdUrl = rotatedUrl;
                            resolve();
                        });
                    });
                }
                
                const timestamp = Date.now();
                const scaleText = scale === '2' ? '2x (HD)' : '4x (4K)';
                
                resultDiv.innerHTML = `
                    <div style="text-align: center; margin-bottom: 0.5rem;">
                        <span style="background: rgba(16,185,129,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; color:#10B981;">
                            <i class="fas fa-check-circle"></i> ${scaleText} Berhasil!
                        </span>
                    </div>
                    <img src="${hdUrl}" class="result-img" onclick="openModal('${hdUrl}')" style="cursor: pointer;">
                    <div style="margin-top: 0.5rem;">
                        <button class="download-btn" onclick="downloadFile('${hdUrl}', 'hd_${scale}x_${timestamp}.png')">
                            <i class="fas fa-download"></i> Download Foto HD
                        </button>
                        <p class="info-text"><i class="fas fa-search-plus"></i> Klik gambar untuk zoom</p>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                resultDiv.innerHTML = `<p class="error"><i class="fas fa-times-circle"></i> Error: ${err.message}. Coba lagi nanti.</p>`;
            }
            enhanceBtn.disabled = false;
        });

        window.downloadFile = downloadFile;
        window.openModal = openModal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
